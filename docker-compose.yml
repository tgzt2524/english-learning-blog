services:
  blog:
    build: .
    container_name: english-learning-blog
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./posts:/app/posts:ro
      - blog-data:/app/data
    environment:
      - SECRET_KEY=englis...26
      - SITE_URL=http://localhost:5000
      - GITHUB_CLIENT_ID=
      - GITHUB_CLIENT_SECRET=
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  blog-data:
