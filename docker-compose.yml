services:
  blog:
    build: .
    container_name: english-learning-blog
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./posts:/app/posts:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 5s
      retries: 3
