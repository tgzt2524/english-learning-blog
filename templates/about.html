{% extends "base.html" %}
{% block title %}关于 — 英语学习博客{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold mb-8"><i class="fa-solid fa-circle-info text-primary mr-3"></i>关于本站</h1>

    <div class="stats shadow w-full mb-8">
        <div class="stat"><div class="stat-figure text-primary"><i class="fa-solid fa-users text-3xl"></i></div><div class="stat-title">注册用户</div><div class="stat-value text-primary">{{ stats.users }}</div></div>
        <div class="stat"><div class="stat-figure text-secondary"><i class="fa-solid fa-comments text-3xl"></i></div><div class="stat-title">总评论</div><div class="stat-value text-secondary">{{ stats.comments }}</div></div>
        <div class="stat"><div class="stat-figure text-accent"><i class="fa-solid fa-file-lines text-3xl"></i></div><div class="stat-title">文章数</div><div class="stat-value text-accent">{{ stats.posts }}</div></div>
        <div class="stat"><div class="stat-figure text-warning"><i class="fa-solid fa-heart text-3xl"></i></div><div class="stat-title">总互动</div><div class="stat-value text-warning">{{ stats.reactions }}</div></div>
    </div>

    <div class="card bg-base-100 shadow-lg mb-8"><div class="card-body">
        <h2 class="card-title text-xl"><i class="fa-solid fa-lightbulb text-warning mr-2"></i>为什么建这个博客</h2>
        <p class="opacity-80">记录英语学习历程，分享知识，一起进步。📝</p>
    </div></div>

    <div class="card bg-base-100 shadow-lg"><div class="card-body">
        <h2 class="card-title text-xl"><i class="fa-solid fa-code-branch text-accent mr-2"></i>开源参与</h2>
        <p class="opacity-80">发现错误或想分享心得？欢迎在 <a href="https://github.com/tgzt2524/english-learning-blog" target="_blank" class="link link-primary font-bold"><i class="fa-brands fa-github mr-1"></i>GitHub</a> 提交 Issue 或 PR。💪</p>
    </div></div>
</div>
{% endblock %}
