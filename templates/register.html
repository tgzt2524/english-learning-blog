{% extends "base.html" %}
{% block title %}注册 — 英语学习博客{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <h2>✨ 注册</h2>
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">👤 用户名</label>
                <input type="text" id="username" name="username" required autofocus minlength="2">
            </div>
            <div class="form-group">
                <label for="email">📧 邮箱</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">🔒 密码</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm">🔒 确认密码</label>
                <input type="password" id="confirm" name="confirm" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">注册</button>
        </form>
        <p class="auth-switch">已有账号？<a href="/login">立即登录</a></p>
    </div>
</div>

{% endblock %}
